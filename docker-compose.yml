services:
  backend:
    build: ./backend
    environment:
      # Optional: set your Anthropic API key here, or leave blank and supply
      # it per-session via the UI (Add API key button).
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Allow requests from the nginx frontend
      CORS_ORIGINS: '["http://localhost","http://localhost:80"]'
    volumes:
      - uploads:/app/uploads
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  uploads:
