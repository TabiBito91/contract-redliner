services:
  - type: web
    name: redlineai-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: UPLOAD_DIR
        value: /data/uploads
      - key: ANTHROPIC_API_KEY
        sync: false            # set manually in the Render dashboard (optional)
    disk:
      name: uploads
      mountPath: /data/uploads
      sizeGB: 1
